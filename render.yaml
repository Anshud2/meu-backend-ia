```yaml
   services:
     - type: web
       name: suno-studio-backend
       runtime: python
       plan: free
       region: oregon
       branch: main
       buildCommand: 'pip install --upgrade pip && pip install -r requirements.txt'
       startCommand: 'gunicorn -w 2 -k gthread -b 0.0.0.0:$PORT app:app --timeout 120'
       healthCheckPath: /health
       autoDeploy: true
       envVars:
         - key: PYTHON_VERSION
           value: 3.11.9
         - key: AIML_API_KEY
           sync: false
 ```
